version: "3.9"

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  AGENT ACCELERATOR — Production Docker Compose                         ║
# ║  All services wired: gateway · rag · factcheck · phase4 · infra        ║
# ╚══════════════════════════════════════════════════════════════════════════╝

services:

  # ── Reverse proxy (public entry point) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
    depends_on:
      - gateway
      - phase4
    restart: always
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Unified gateway (Phase 3 — agent loop + v1 API) ─────────────────────
  gateway:
    build:
      context: .
      dockerfile: infra/Dockerfile.gateway
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_SECRET=${ADMIN_SECRET}
      - VAULT_MASTER_SECRET=${VAULT_MASTER_SECRET}
      - DB_URL=postgresql://agent:${POSTGRES_PASSWORD}@postgres:5432/agentdb
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  # ── Phase 4 server (pilot · metrics · billing · SOC2 · GTM) ─────────────
  phase4:
    build:
      context: .
      dockerfile: infra/Dockerfile.phase4
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DB_URL=postgresql://agent:${POSTGRES_PASSWORD}@postgres:5432/agentdb
      - REDIS_URL=redis://redis:6379/1
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8090:8090"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/v4/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL + pgvector ────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=agent
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=agentdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agentdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    restart: always

  # ── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_SERVER_ROOT_URL=https://${DOMAIN}/grafana
    volumes:
      - grafdata:/var/lib/grafana
      - ./infra/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    restart: always

volumes:
  pgdata:
  redisdata:
  promdata:
  grafdata:
