name: Agent Accelerator — Deploy to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/agent-accelerator

jobs:
  # ── Test ────────────────────────────────────────────────────────────────
  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}

      - name: Run Phase 2 exit benchmark
        run: python phase2_benchmark.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}

  # ── Build images ─────────────────────────────────────────────────────────
  build:
    name: Build Docker images
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.gateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/gateway:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/gateway:${{ github.sha }}

      - name: Build and push phase4 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.phase4
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/phase4:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/phase4:${{ github.sha }}

  # ── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/agent-accelerator
            git pull origin main

            # Pull latest images
            docker compose -f infra/docker-compose.yml pull

            # Zero-downtime rolling update
            docker compose -f infra/docker-compose.yml up -d --no-deps --build gateway
            sleep 10
            docker compose -f infra/docker-compose.yml up -d --no-deps --build phase4

            # Health check
            sleep 15
            curl -f http://localhost:8080/v1/health || exit 1
            curl -f http://localhost:8090/v4/health || exit 1

            echo "Deployment successful — $(date)"

      - name: Notify on success
        if: success()
        run: |
          echo "Production deployment successful"
          echo "Commit: ${{ github.sha }}"
          echo "Actor:  ${{ github.actor }}"

      - name: Notify on failure
        if: failure()
        run: echo "DEPLOYMENT FAILED — rolling back"
